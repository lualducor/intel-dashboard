{% for a in articles %}
  {% include "_article_card.html" %}
{% endfor %}
{% if has_more %}
<div class="load-more">
  <button
    type="button"
    class="btn"
    hx-get="/feed?queue={{ active_queue }}&page={{ page + 1 }}{% if category %}&category={{ category|urlencode }}{% endif %}{% if source %}&source={{ source|urlencode }}{% endif %}{% if min_score is not none %}&min_score={{ min_score }}{% endif %}"
    hx-target="closest .load-more"
    hx-swap="outerHTML"
  >Load {{ page_size }} more</button>
</div>
{% endif %}
