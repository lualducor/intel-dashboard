<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}INTEL{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/vendor/htmx.min.js"></script>
  <script src="/static/shortcuts.js" defer></script>
</head>
<body>
  {% set current_path = request.url.path if request is defined else '' %}
  <header class="top-bar">
    <a class="brand" href="/">
      <span class="status-dot" aria-hidden="true"></span>
      <span class="brand-name">INTEL</span>
      <span class="brand-sub">signal desk</span>
    </a>
    <nav class="global-nav" aria-label="Primary navigation">
      <span class="nav-group">
        <a href="/"{% if current_path == '/' %} class="active" aria-current="page"{% endif %}>AI</a>
        <a href="/tech"{% if current_path == '/tech' %} class="active" aria-current="page"{% endif %}>Tech</a>
        <a href="/topics/colombia"{% if current_path == '/topics/colombia' %} class="active" aria-current="page"{% endif %}>Colombia</a>
        <a href="/topics/crypto"{% if current_path == '/topics/crypto' %} class="active" aria-current="page"{% endif %}>Crypto</a>
      </span>
      <span class="nav-group nav-workspace">
        <a href="/saved"{% if current_path in ['/saved', '/archive'] %} class="active" aria-current="page"{% endif %}>Saved</a>
        <a href="/content"{% if current_path == '/content' %} class="active" aria-current="page"{% endif %}>Content</a>
        <a href="/search"{% if current_path == '/search' %} class="active" aria-current="page"{% endif %}>Search</a>
      </span>
      <span class="nav-group nav-operations">
        <a href="/sources"{% if current_path == '/sources' %} class="active" aria-current="page"{% endif %}>Sources</a>
        <a href="/sources/health"{% if current_path == '/sources/health' %} class="active" aria-current="page"{% endif %}>Health</a>
      </span>
    </nav>
    <div class="top-bar-actions">
      <a class="clip-link" href="/clip"{% if current_path == '/clip' %} aria-current="page"{% endif %}>+ Clip</a>
      <button type="button" class="help-trigger" data-open-help aria-label="Show keyboard shortcuts" title="Keyboard shortcuts">?</button>
      <button
        type="button"
        class="refresh-all"
        hx-post="/ingest/run"
        hx-swap="none"
        hx-on::after-request="if(event.detail.successful) window.location.reload()"
      >
        <span class="refresh-icon" aria-hidden="true">↻</span>
        <span class="refresh-label">Sync</span>
        <span class="refreshing-label">Syncing</span>
      </button>
    </div>
  </header>

  {% block content %}{% endblock %}

  {% include "_help_overlay.html" %}
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
