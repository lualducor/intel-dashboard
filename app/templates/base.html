<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}INTEL{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/vendor/htmx.min.js"></script>
  <script src="/static/shortcuts.js" defer></script>
</head>
<body>
  <header class="top-bar">
    <a class="brand" href="/">
      <span class="status-dot" aria-hidden="true"></span>
      INTEL
      <span class="brand-sub">intelligence triage</span>
    </a>
    <nav class="global-nav" aria-label="Primary navigation">
      <a href="/">AI</a>
      <a href="/topics/colombia">Colombia</a>
      <a href="/topics/crypto">Crypto</a>
      <a href="/saved">Saved</a>
      <a href="/search">Search</a>
      <a href="/content">Content</a>
      <a href="/sources">Sources</a>
      <a href="/sources/health">Health</a>
    </nav>
    <div class="top-bar-actions">
      <button
        type="button"
        class="refresh-all"
        hx-post="/ingest/run"
        hx-swap="none"
        hx-on::after-request="if(event.detail.successful) window.location.reload()"
      >
        ↻ Refresh All
      </button>
    </div>
  </header>

  {% block content %}{% endblock %}

  {% include "_help_overlay.html" %}
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
