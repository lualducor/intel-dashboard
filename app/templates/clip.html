{% extends "base.html" %}

{% block title %}Clip — INTEL{% endblock %}

{% block content %}
<main class="clip-container">
  <header class="page-header">
    <p class="eyebrow">Manual capture</p>
    <h1>Clip an article</h1>
    <p>Paste a URL and INTEL will extract, score, and save it to your local library.</p>
  </header>

  <form method="POST" action="/clip" class="clip-form">
    <div class="field">
      <label for="url">Article URL</label>
      <input
        type="url"
        name="url"
        id="url"
        required
        placeholder="https://..."
        autofocus
      >
    </div>

    <div class="field">
      <label for="use_type">Use type <span>Optional</span></label>
      <select
        name="use_type"
        id="use_type"
      >
        <option value=""></option>
        <option value="twitch">Twitch</option>
        <option value="linkedin">LinkedIn</option>
        <option value="blog">Blog</option>
        <option value="newsletter">Newsletter</option>
        <option value="project_research">Project Research</option>
        <option value="job_market">Job Market</option>
        <option value="personal_reading">Personal Reading</option>
      </select>
    </div>

    <div class="field">
      <label for="content_angle">Content angle <span>Optional</span></label>
      <textarea
        name="content_angle"
        id="content_angle"
        rows="3"
        placeholder="Why are you clipping this? What's the angle?"
      ></textarea>
    </div>

    <button type="submit" class="btn-primary">Clip and score</button>
  </form>
</main>
{% endblock %}
