{% extends "base.html" %}

{% block title %}Clip — INTEL{% endblock %}

{% block content %}
<main class="clip-container" style="max-width: 600px; margin: 2rem auto; padding: 0 1rem;">
  <h1>Clip Article</h1>
  <p class="helper-text" style="color: #666; margin-bottom: 2rem;">
    Enter a URL to manually add an article to your dashboard. It will be downloaded, extracted, scored, and saved automatically.
  </p>

  <form method="POST" action="/clip" class="clip-form">
    <div class="field" style="margin-bottom: 1.5rem;">
      <label for="url" style="display: block; font-weight: bold; margin-bottom: 0.5rem;">Article URL</label>
      <input
        type="url"
        name="url"
        id="url"
        required
        placeholder="https://..."
        autofocus
        style="width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 4px;"
      >
    </div>

    <div class="field" style="margin-bottom: 1.5rem;">
      <label for="use_type" style="display: block; font-weight: bold; margin-bottom: 0.5rem;">Use Type (Optional)</label>
      <select
        name="use_type"
        id="use_type"
        style="width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 4px;"
      >
        <option value=""></option>
        <option value="twitch">Twitch</option>
        <option value="linkedin">LinkedIn</option>
        <option value="blog">Blog</option>
        <option value="newsletter">Newsletter</option>
        <option value="project_research">Project Research</option>
        <option value="job_market">Job Market</option>
        <option value="personal_reading">Personal Reading</option>
      </select>
    </div>

    <div class="field" style="margin-bottom: 1.5rem;">
      <label for="content_angle" style="display: block; font-weight: bold; margin-bottom: 0.5rem;">Content Angle (Optional)</label>
      <textarea
        name="content_angle"
        id="content_angle"
        rows="3"
        placeholder="Why are you clipping this? What's the angle?"
        style="width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 4px; font-family: inherit;"
      ></textarea>
    </div>

    <button
      type="submit"
      class="btn-primary"
      style="background: #007bff; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 4px; cursor: pointer; font-weight: bold;"
    >
      Clip
    </button>
  </form>
</main>
{% endblock %}
