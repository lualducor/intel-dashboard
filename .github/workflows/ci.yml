name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -c requirements.lock -e ".[dev]"
      - run: python -m ruff check app scripts tests
      - run: python -m pytest -q
      - run: python -m pip wheel . --no-deps --wheel-dir dist
